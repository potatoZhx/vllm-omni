server:
  host: 0.0.0.0
  port: 8089
  request_timeout_s: 1800
  instance_health_check_interval_s: 5.0
  instance_health_check_timeout_s: 1.0

scheduler:
  tie_breaker: random
  ewma_alpha: 0.2

policy:
  baseline:
    algorithm: short_queue_runtime

instances:
  - id: worker-0
    endpoint: http://127.0.0.1:9001
    sp_size: 1
    max_concurrency: 2
  - id: worker-1
    endpoint: http://127.0.0.1:9002
    sp_size: 1
    max_concurrency: 2
